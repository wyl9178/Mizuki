<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙翼 (DragnWing)系列软件产品下载中心</title>
    <style>
        :root {
            --bg-color: #e0ecfb;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #333;
            --accent-blue: #4a90e2;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            background: linear-gradient(135deg, #e0ecfb 0%, #f0f7ff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 900px;
            width: 100%;
        }

        .download-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            width: 100%;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .software-preview {
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border: 1px solid #ddd;
        }

        /* 调整容器以容纳两个按钮 */
        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #669df6 0%, #4a90e2 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        /* 官网跳转按钮样式：尺寸略小，颜色较浅以示区分 */
        .website-btn {
            display: inline-block;
            background: #fff;
            color: var(--accent-blue);
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            border: 1px solid var(--accent-blue);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        .website-btn:hover {
            background: var(--accent-blue);
            color: white;
            transform: translateY(-1px);
        }

        .info-tag {
            font-size: 0.9rem;
            color: #666;
            margin: 0;
        }

        .sub-tip {
            font-size: 0.75rem;
            color: #999;
            margin-top: -5px;
        }

        footer {
            padding: 20px;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="download-card">
            <h1>龙翼 (DragnWing) 系统规格查看器</h1>
            
            <img src="/assets/files/dw.png" alt="龙翼系统规格查看器预览" class="software-preview">

            <div class="actions">
                <div class="btn-group">
                    <a href="/assets/files/龙翼系统规格查看器.exe" download="龙翼系统规格查看器.exe" class="download-btn">
                        立即下载 (.exe)
                    </a>
                    
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                        <a href="https://wylnb.mirrorx.ltd" class="website-btn">
                            访问官网
                        </a>
                        <span class="sub-tip">进入官网查看更多产品</span>
                    </div>
                </div>
                
                <p class="info-tag">适用系统：Windows 10 / 11</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2021-2026 Yusen Co. Ltd. All rights reserved.</p>
    </footer>

</body>
</html>
